# Shared config for the marine-data-cache volume -> NAS bind-mount migration.
# Sourced by migrate-cache-to-nas.sh, rollback-cache-migration.sh, and the
# cron entry-point scripts (run-drain.sh, run-force-check.sh) so all of them
# agree on where the cache actually lives on the host.
#
# Override any value by exporting it in the environment before invoking a
# script (e.g. `MARINE_DATA_CACHE_NAS_PATH=/mnt/nas/marine-cache ./migrate-cache-to-nas.sh`),
# or by editing the defaults below directly.

# Name of the Docker-managed volume the cache currently lives in (pre-migration).
CACHE_VOLUME_NAME="${CACHE_VOLUME_NAME:-marine-data-cache}"

# Destination host path for the bind mount. /srv/data is a second local
# disk shared by many other apps/services and was already at 96% full
# during a real migration attempt — /mnt/storage (5.5TB, ~1.3TB free) is
# the actual NAS-backed disk this worker already uses (see the read-only
# marine-data-gebco bind mount) and is the correct target.
NAS_CACHE_PATH="${MARINE_DATA_CACHE_NAS_PATH:-/mnt/storage/marine-data-cache}"

# Where migration state/logs/backups are kept — outside the repo so it
# survives `git clean` and isn't accidentally committed.
MIGRATION_STATE_DIR="${MIGRATION_STATE_DIR:-${HOME}/backups/marine-data-worker/cache-migration}"

# Small, already-available image used as a root-privileged "toolbox" for
# host-path filesystem operations (the volume's files are root-owned inside
# the container and unreadable by the invoking host user directly — see
# docs/marine-data-worker.md and the migration script's header comment for
# why this is the intended way to touch them, not a workaround).
TOOLBOX_IMAGE="${TOOLBOX_IMAGE:-alpine:latest}"

# The worker's own image, used for the end-to-end read/write/restart
# validation pass (requirement: "validate the worker can read/write/survive
# restarts" against the *actual* image, not a generic toolbox).
WORKER_IMAGE="${WORKER_IMAGE:-marine-data-worker}"

# Name of the always-on container (started manually, outside the cron
# schedule) that also mounts the cache volume. Recreated against the new
# bind mount during cutover.
STANDALONE_CONTAINER_NAME="${STANDALONE_CONTAINER_NAME:-marine-data-worker-fixed}"
